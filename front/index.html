<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOR</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <h1 class="logo">Suomen Opiskelija Ravintolat</h1>
        <nav class="nav">
          <a href="#boxes">Ravintolat</a>
          <a id="auth-header-link" href="./login.html" class="button-link"
            >Kirjaudu</a
          >
        </nav>
      </div>
    </header>

    <main class="main container">
      <h2 id="maintext">Ravintolat</h2>
      <p>Lista ravintoloista.</p>

      <div class="boxes" id="ravintolat"></div>
    </main>

    <footer class="footer">
      <div class="container" id="about">
        <h3>About</h3>
        <p>Tämä sivu näyttää suomen opiskelija ravintolat.</p>
      </div>
    </footer>
    <dialog id="restaurant-dialog">
      <form method="dialog">
        <h2 id="name"></h2>
        <p id="address"></p>
        <p id="pcode"></p>
        <p id="phone"></p>
        <div class="menu-buttons">
          <button type="button" id="daily-btn">Daily</button>
          <button type="button" id="weekly-btn">Weekly</button>
          <button type="button" id="favorite-btn">Tee suosikiksi</button>
        </div>
        <div id="menu-list"></div>
        <menu>
          <button value="close" id="close">Sulje</button>
        </menu>
      </form>
    </dialog>
  </body>
  <script src="./script.js"></script>
  <script>
    const authHeaderLink = document.getElementById("auth-header-link");
    const token = localStorage.getItem("authToken");
    if (authHeaderLink) {
      authHeaderLink.textContent = token ? "Tiedot" : "Kirjaudu";
    }
  </script>
</html>
